name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Cache Zig build artifacts
        uses: actions/cache@v5
        with:
          path: .zig-cache
          key: zig-${{ matrix.os }}-${{ hashFiles('build.zig', 'build.zig.zon', 'src/**') }}
          restore-keys: zig-${{ matrix.os }}-

      - name: Unit tests + conformance (test262-parser-tests)
        run: zig build test --summary all
