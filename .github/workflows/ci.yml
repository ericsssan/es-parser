name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          # Pin to the project's declared minimum_zig_version (build.zig.zon).
          # `master` drifts (e.g. dev.657 deprecated @typeInfo().fields), breaking
          # the build on a toolchain we don't target. The Nightly workflow still
          # tracks master as an early-warning canary.
          version: 0.17.0-dev.607+456b2ec07

      - name: Cache Zig build artifacts
        uses: actions/cache@v5
        with:
          path: .zig-cache
          key: zig-${{ matrix.os }}-${{ hashFiles('build.zig', 'build.zig.zon', 'src/**') }}
          restore-keys: zig-${{ matrix.os }}-

      - name: Unit tests + conformance (test262-parser-tests)
        run: zig build test --summary all
